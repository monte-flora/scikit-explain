name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/scikit-explain

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Build source and wheel distributions
        run: |
          python -m build
          twine check --strict dist/*

      - name: Display distributions
        run: ls -lh dist/

      # Primary: Trusted Publishing (no token needed)
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # Fallback: API Token method
      # If Trusted Publishing fails, comment out the step above
      # and uncomment the step below:
      # - name: Publish distribution to PyPI (API Token)
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     user: __token__
      #     password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
